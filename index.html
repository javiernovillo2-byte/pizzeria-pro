<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzería Pro - Gestor de Negocio</title>

  <!-- Firebase COMPAT (importante) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .container {
      background:white;
      width:90%;
      max-width:500px;
      padding:40px;
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    h1,h2 { text-align:center; color:#667eea; margin-bottom:20px; }
    .form-group { margin-bottom:20px; }
    label { display:block; margin-bottom:8px; color:#333; }
    input {
      width:100%; padding:12px; border:2px solid #ddd;
      border-radius:8px; font-size:16px;
    }
    button {
      width:100%; padding:12px; border:none; border-radius:8px;
      background:#667eea; color:white; font-size:16px; cursor:pointer;
      margin-top:10px;
    }
    .logout-btn { background:#e74c3c; }
    .toggle-form { text-align:center; margin-top:20px; }
    .toggle-form a { color:#667eea; cursor:pointer; font-weight:bold; }
    .error, .success {
      display:none; padding:12px; border-radius:8px; margin-bottom:20px;
    }
    .error { background:#fee; color:#c33; }
    .success { background:#efe; color:#090; }
    .dashboard { display:none; }
    .info-card {
      background:#f5f5f5; padding:15px; border-radius:8px; margin-bottom:15px;
    }
    .status { text-align:center; margin-bottom:20px; color:green; }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN / REGISTRO -->
  <div id="authForm">
    <h1>🍕 Pizzería Pro</h1>
    <div class="status" id="statusText">Conectado ✓</div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <div id="signupForm">
      <h2>Crear Cuenta</h2>

      <div class="form-group">
        <label>Nombre del Negocio</label>
        <input type="text" id="businessName">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="signupPassword">
      </div>

      <button onclick="signup()">Crear Cuenta</button>

      <div class="toggle-form">
        ¿Ya tienes cuenta? <a onclick="toggleForm()">Inicia sesión</a>
      </div>
    </div>

    <div id="loginForm" style="display:none;">
      <h2>Iniciar Sesión</h2>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword">
      </div>

      <button onclick="login()">Entrar</button>

      <div class="toggle-form">
        ¿No tienes cuenta? <a onclick="toggleForm()">Regístrate</a>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard">
    <h2>Bienvenido 🍕</h2>

    <div class="info-card">
      <strong>Negocio:</strong><br>
      <span id="displayBusinessName"></span>
    </div>

    <div class="info-card">
      <strong>Email:</strong><br>
      <span id="displayEmail"></span>
    </div>

    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<!-- tu archivo separado -->
<script src="firebase-config.js"></script>

<script>
  let currentUser = null;

  firebase.auth().onAuthStateChanged((user) => {
    console.log('Auth cargó');

    if (user) {
      currentUser = user;
      showDashboard();
      loadUserData();
    } else {
      currentUser = null;
      showAuthForm();
    }
  });

  function toggleForm() {
    const signup = document.getElementById('signupForm');
    const login = document.getElementById('loginForm');

    if (signup.style.display === 'none') {
      signup.style.display = 'block';
      login.style.display = 'none';
    } else {
      signup.style.display = 'none';
      login.style.display = 'block';
    }
    clearMessages();
  }

  function signup() {
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const businessName = document.getElementById('businessName').value;

    if (!email || !password || !businessName) {
      showError('Completa todos los campos');
      return;
    }

    firebase.auth().createUserWithEmailAndPassword(email, password)
      .then((userCredential) => {
        const userId = userCredential.user.uid;
        return firebase.database().ref('users/' + userId).set({
          email: email,
          businessName: businessName,
          createdAt: new Date().toISOString()
        });
      })
      .then(() => {
        showSuccess('Cuenta creada');
        setTimeout(() => {
          showDashboard();
        }, 500);
      })
      .catch((error) => {
        showError(error.message);
      });
  }

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    firebase.auth().signInWithEmailAndPassword(email, password)
      .catch((error) => {
        showError(error.message);
      });
  }

  function logout() {
    firebase.auth().signOut();
  }

  function showAuthForm() {
    document.getElementById('authForm').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }

  function showDashboard() {
    console.log('Mostrando dashboard');
    document.getElementById('authForm').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    if (firebase.auth().currentUser) {
      document.getElementById('displayEmail').textContent = firebase.auth().currentUser.email;
    }

    document.getElementById('displayBusinessName').textContent =
      document.getElementById('businessName').value || 'Mi Pizzería';
  }

  function loadUserData() {
    if (!firebase.auth().currentUser) return;

    const userId = firebase.auth().currentUser.uid;
    firebase.database().ref('users/' + userId).once('value')
      .then((snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          document.getElementById('displayBusinessName').textContent = data.businessName;
        }
      });
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.innerText = '❌ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  function showSuccess(msg) {
    const el = document.getElementById('success');
    el.innerText = '✅ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function clearMessages() {
    document.getElementById('error').style.display = 'none';
    document.getElementById('success').style.display = 'none';
  }
</script>

</body>
</html>
