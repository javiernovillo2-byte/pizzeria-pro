<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzería Pro</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
    .container{max-width:1000px;margin:auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    h1,h2{text-align:center;color:#667eea;margin-bottom:20px}
    input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;font-size:16px}
    input{border:2px solid #ddd} button{border:none;background:#667eea;color:#fff;cursor:pointer}
    .logout-btn{background:#e74c3c}
    .error,.success{display:none;padding:10px;border-radius:8px;margin-bottom:10px}.error{background:#fee;color:#c33}.success{background:#efe;color:#090}
    #dashboard{display:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px}
    .card{background:#f5f5f5;padding:25px;border-radius:15px;text-align:center;cursor:pointer}
    .card:hover{background:#eef2ff}
    .info{background:#f5f5f5;padding:15px;border-radius:10px;margin-bottom:15px}
    .toggle-form{text-align:center;margin-top:15px}.toggle-form a{color:#667eea;cursor:pointer}
  </style>
</head>
<body>
<div class="container">
  <div id="authForm">
    <h1>🍕 Pizzería Pro</h1>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <div id="signupForm">
      <h2>Crear Cuenta</h2>
      <input id="businessName" placeholder="Nombre del negocio">
      <input id="signupEmail" type="email" placeholder="Email">
      <input id="signupPassword" type="password" placeholder="Contraseña (6+)">
      <button onclick="signup()">Crear Cuenta</button>
      <div class="toggle-form">¿Ya tienes cuenta? <a onclick="toggleForm()">Inicia sesión</a></div>
    </div>
    <div id="loginForm" style="display:none">
      <h2>Iniciar Sesión</h2>
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Contraseña">
      <button onclick="login()">Entrar</button>
      <div class="toggle-form">¿No tienes cuenta? <a onclick="toggleForm()">Regístrate</a></div>
    </div>
  </div>

  <div id="dashboard">
    <h1>🍕 Pizzería Pro</h1>
    <div class="info"><strong>Negocio:</strong> <span id="displayBusinessName"></span></div>
    <div class="info"><strong>Email:</strong> <span id="displayEmail"></span></div>
    <h2>Tu sistema de gestión</h2>
    <div class="grid">
      <div class="card">📋 Movimientos</div>
      <div class="card">🍕 Pizzas</div>
      <div class="card">📦 Stock</div>
      <div class="card">📈 Análisis</div>
      <div class="card">⚙️ Configuración</div>
      <div class="card">💰 Ventas</div>
    </div>
    <button class="logout-btn" onclick="logout()" style="margin-top:30px">Cerrar sesión</button>
  </div>
</div>

<script src="firebase-config.js"></script>
<script>
let currentUser=null;
firebase.auth().onAuthStateChanged(user=>{ if(user){ currentUser=user; showDashboard(); loadUserData(); } else { showAuthForm(); }});
function toggleForm(){ const s=document.getElementById('signupForm'), l=document.getElementById('loginForm'); if(s.style.display==='none'){s.style.display='block';l.style.display='none'}else{s.style.display='none';l.style.display='block'}; clearMessages(); }
function signup(){ const e=signupEmail.value,p=signupPassword.value,b=businessName.value; if(!e||!p||!b) return showError('Completa todos los campos'); firebase.auth().createUserWithEmailAndPassword(e,p).then(c=>firebase.database().ref('users/'+c.user.uid).set({email:e,businessName:b})).then(()=>showDashboard()).catch(x=>showError(x.message)); }
function login(){ firebase.auth().signInWithEmailAndPassword(loginEmail.value,loginPassword.value).catch(x=>showError(x.message)); }
function logout(){ firebase.auth().signOut(); }
function showAuthForm(){ authForm.style.display='block'; dashboard.style.display='none'; }
function showDashboard(){ authForm.style.display='none'; dashboard.style.display='block'; if(firebase.auth().currentUser) displayEmail.textContent=firebase.auth().currentUser.email; displayBusinessName.textContent=businessName.value||'Mi Pizzería'; }
function loadUserData(){ const u=firebase.auth().currentUser; if(!u) return; firebase.database().ref('users/'+u.uid).once('value').then(s=>{ if(s.exists()) displayBusinessName.textContent=s.val().businessName; }); }
function showError(m){ error.innerText='❌ '+m; error.style.display='block'; setTimeout(()=>error.style.display='none',4000); }
function clearMessages(){ error.style.display='none'; success.style.display='none'; }
</script>
</body>
</html>
