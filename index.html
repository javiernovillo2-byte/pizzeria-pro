<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pizzería Pro</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}
.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}
button{
padding:12px 20px;
border:none;
background:#667eea;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}
button:hover{opacity:.9}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}
.module{
background:white;
padding:30px;
text-align:center;
border-radius:12px;
cursor:pointer;
font-size:22px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.module:hover{
transform:translateY(-3px);
}
.hidden{
display:none;
}
.red{
background:#e74c3c;
}
</style>
</head>
<body>

<div class="wrap">

<div id="auth" class="card">
<h1>🍕 Pizzería Pro</h1>

<h3>Crear cuenta</h3>
<input id="businessName" placeholder="Nombre negocio">
<input id="registerEmail" placeholder="Email">
<input id="registerPassword" type="password" placeholder="Contraseña">
<button onclick="register()">Crear cuenta</button>

<hr>

<h3>Iniciar sesión</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>


<div id="dashboard" class="hidden">

<div class="card">
<h2>Bienvenido</h2>
<p><b>Negocio:</b> <span id="biz"></span></p>
<p><b>Email:</b> <span id="mail"></span></p>
<button class="red" onclick="logout()">Cerrar sesión</button>
</div>

<div class="grid">
<div class="module" onclick="abrir('movimientos')">📋 Movimientos</div>
<div class="module" onclick="abrir('pizzas')">🍕 Pizzas</div>
<div class="module" onclick="abrir('stock')">📦 Stock</div>
<div class="module" onclick="abrir('ventas')">💰 Ventas</div>
</div>

<div id="contenido" class="card hidden"></div>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDwUirH-Ylk5WkTPCpPAMuU5l4bWLDljVo",
  authDomain: "pizzeria-pro-e0964.firebaseapp.com",
  databaseURL: "https://pizzeria-pro-e0964-default-rtdb.firebaseio.com",
  projectId: "pizzeria-pro-e0964",
  storageBucket: "pizzeria-pro-e0964.firebasestorage.app",
  messagingSenderId: "820646614801",
  appId: "1:820646614801:web:e03f1a15e696d95bbe5eb0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

function msg(t){
document.getElementById("msg").innerText=t;
}

function register(){
let b=document.getElementById("businessName").value;
let e=document.getElementById("registerEmail").value;
let p=document.getElementById("registerPassword").value;

auth.createUserWithEmailAndPassword(e,p)
.then(r=>{
db.ref("users/"+r.user.uid+"/profile").set({
business:b,
email:e
});
msg("Cuenta creada");
})
.catch(err=>msg(err.message));
}

function login(){
let e=document.getElementById("loginEmail").value;
let p=document.getElementById("loginPassword").value;

auth.signInWithEmailAndPassword(e,p)
.catch(err=>msg(err.message));
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("auth").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

db.ref("users/"+user.uid+"/profile").once("value")
.then(s=>{
let d=s.val();
document.getElementById("biz").innerText=d.business;
document.getElementById("mail").innerText=d.email;
});
}else{
document.getElementById("auth").classList.remove("hidden");
document.getElementById("dashboard").classList.add("hidden");
}
});


function abrir(tipo){
let c=document.getElementById("contenido");
c.classList.remove("hidden");

if(tipo==="movimientos"){
c.innerHTML=`
<h2>📋 Movimientos</h2>
<input id="mDesc" placeholder="Descripción">
<input id="mMonto" placeholder="Monto">
<button onclick="guardarMovimiento()">Guardar</button>
<div id="lista"></div>
`;
cargarLista("movimientos");
}

if(tipo==="pizzas"){
c.innerHTML=`
<h2>🍕 Pizzas</h2>
<input id="pNom" placeholder="Nombre">
<input id="pPrecio" placeholder="Precio">
<button onclick="guardarPizza()">Guardar</button>
<div id="lista"></div>
`;
cargarLista("pizzas");
}

if(tipo==="stock"){
c.innerHTML=`
<h2>📦 Stock</h2>
<input id="sNom" placeholder="Producto">
<input id="sCant" placeholder="Cantidad">
<button onclick="guardarStock()">Guardar</button>
<div id="lista"></div>
`;
cargarLista("stock");
}

if(tipo==="ventas"){
c.innerHTML=`
<h2>💰 Ventas</h2>
<input id="vCli" placeholder="Cliente">
<input id="vTot" placeholder="Total">
<button onclick="guardarVenta()">Guardar</button>
<div id="lista"></div>
`;
cargarLista("ventas");
}
}

function uid(){
return auth.currentUser.uid;
}

function guardarMovimiento(){
db.ref("users/"+uid()+"/movimientos").push({
descripcion:document.getElementById("mDesc").value,
monto:document.getElementById("mMonto").value
});
abrir("movimientos");
}

function guardarPizza(){
db.ref("users/"+uid()+"/pizzas").push({
nombre:document.getElementById("pNom").value,
precio:document.getElementById("pPrecio").value
});
abrir("pizzas");
}

function guardarStock(){
db.ref("users/"+uid()+"/stock").push({
producto:document.getElementById("sNom").value,
cantidad:document.getElementById("sCant").value
});
abrir("stock");
}

function guardarVenta(){
db.ref("users/"+uid()+"/ventas").push({
cliente:document.getElementById("vCli").value,
total:document.getElementById("vTot").value
});
abrir("ventas");
}

function cargarLista(tipo){
db.ref("users/"+uid()+"/"+tipo).once("value")
.then(s=>{
let html="";
s.forEach(x=>{
html += "<div class='card'>"+JSON.stringify(x.val())+"</div>";
});
document.getElementById("lista").innerHTML=html || "Sin datos";
});
}

</script>
</body>
</html>
